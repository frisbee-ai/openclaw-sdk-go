# GoReleaser configuration for openclaw-sdk-go
# This is a library project, so the focus is on Go module distribution
# rather than binary distribution.

version: 2

project_name: openclaw-sdk-go

# Before hooks
before:
  hooks:
    - go mod tidy
    - go generate ./...
    - go test ./...

# Go module verification (critical for library projects)
gomod:
  proxy: true
  mod: mod

# Snapshots (for testing)
snapshot:
  version_template: "{{ incpatch .Version }}-next"


# Release configuration
release:
  prerelease: auto
  mode: replace
  replace_existing_artifacts: true

# Source distribution
source:
  enabled: true
  name_template: '{{ .ProjectName }}-{{ .Version }}-source'

# Announcement (optional)
announce:
  discord:
    enabled: false
  mastodon:
    enabled: false
  reddit:
    enabled: false
  slack:
    enabled: false
  smtp:
    enabled: false
  teams:
    enabled: false
  telegram:
    enabled: false
  twitter:
    enabled: false

# Nightly releases (optional - requires separate configuration)
# nightly:
#   publish_release: false
